<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalawy Dashboard | لوحة الطالب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-blue-700 text-white shadow-lg p-4 mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic tracking-wider">KALAWY <span class="text-blue-200">EDU</span></h1>
            <div class="flex items-center gap-4">
                <span id="userName" class="text-sm">أهلاً بك</span>
                <i class="fas fa-user-circle text-2xl"></i>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-5xl">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-1 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-lg mb-4 border-b pb-2">خطوات الحجز</h3>
                    <ul class="space-y-4">
                        <li id="li-step1" class="flex items-center gap-3 text-blue-600 font-bold">
                            <span class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">1</span> اختار المادة
                        </li>
                        <li id="li-step2" class="flex items-center gap-3 text-gray-400">
                            <span class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">2</span> اختار المدرس
                        </li>
                        <li id="li-step3" class="flex items-center gap-3 text-gray-400">
                            <span class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">3</span> اختار الحصة
                        </li>
                    </ul>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                
                <div id="step1" class="bg-white p-6 rounded-2xl shadow-md transition-all">
                    <label class="block text-xl font-bold mb-4 text-gray-700">📚 اختر المادة التعليمية</label>
                    <div id="subjectsGrid" class="grid grid-cols-2 gap-4">
                        <div class="animate-pulse bg-gray-200 h-16 rounded-xl"></div>
                        <div class="animate-pulse bg-gray-200 h-16 rounded-xl"></div>
                    </div>
                </div>

                <div id="step2" class="bg-white p-6 rounded-2xl shadow-md hidden">
                    <label class="block text-xl font-bold mb-4 text-gray-700">👨‍🏫 اختر المدرس</label>
                    <div id="teachersGrid" class="grid grid-cols-2 gap-4"></div>
                </div>

                <div id="step3" class="bg-white p-6 rounded-2xl shadow-md hidden">
                    <label class="block text-xl font-bold mb-4 text-gray-700">🎬 الحصص المتاحة</label>
                    <div id="lessonsGrid" class="space-y-3"></div>
                </div>

                <div id="step4" class="bg-blue-50 border-2 border-blue-200 p-6 rounded-2xl shadow-md hidden animate-bounce-short">
                    <h4 class="font-bold text-blue-800 mb-2">تفعيل الحصة الآن</h4>
                    <p id="lessonNameLabel" class="text-sm mb-4 text-blue-600 font-semibold"></p>
                    <div class="flex gap-2">
                        <input type="text" id="activationCode" placeholder="أدخل الكود هنا" 
                               class="flex-1 p-3 rounded-xl border-2 border-blue-200 focus:outline-none focus:border-blue-500">
                        <button id="activateBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg">
                            فتح الحصة
                        </button>
                    </div>
                    <div id="statusMsg" class="mt-3 text-sm"></div>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const SUPABASE_URL = 'https://xjdhbbjeeasdmohbhgze.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jcMmE0j0QAf9ii2AVD3N8Q_GKto6KYa';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentLessonId = null;

        // Load Subjects
        async function loadSubjects() {
            const { data } = await supabase.from('subjects').select('*');
            const grid = document.getElementById('subjectsGrid');
            grid.innerHTML = '';
            data.forEach(sub => {
                const btn = document.createElement('button');
                btn.className = "p-4 bg-gray-50 border-2 border-gray-100 hover:border-blue-500 hover:bg-blue-50 rounded-xl font-bold transition-all text-right flex items-center justify-between";
                btn.innerHTML = `${sub.name} <i class="fas fa-chevron-left text-xs"></i>`;
                btn.onclick = () => selectSubject(sub.id);
                grid.appendChild(btn);
            });
        }

        async function selectSubject(subId) {
            const { data } = await supabase.from('teachers').select('*').eq('subject_id', subId);
            const grid = document.getElementById('teachersGrid');
            grid.innerHTML = '';
            data.forEach(t => {
                const btn = document.createElement('button');
                btn.className = "p-4 bg-white border-2 border-gray-100 hover:border-green-500 rounded-xl shadow-sm font-semibold flex items-center gap-3";
                btn.innerHTML = `<div class="bg-green-100 p-2 rounded-full"><i class="fas fa-chalkboard-teacher text-green-600"></i></div> ${t.name}`;
                btn.onclick = () => selectTeacher(t.id);
                grid.appendChild(btn);
            });
            document.getElementById('step2').classList.remove('hidden');
            updateSidebar(2);
        }

        async function selectTeacher(teacherId) {
            const { data } = await supabase.from('lessons').select('*').eq('teacher_id', teacherId);
            const grid = document.getElementById('lessonsGrid');
            grid.innerHTML = '';
            data.forEach(lesson => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white border border-gray-200 rounded-xl flex justify-between items-center hover:shadow-md transition-all";
                div.innerHTML = `
                    <div>
                        <span class="block font-bold">${lesson.title}</span>
                        <span class="text-xs text-gray-500">${lesson.price} جنيه</span>
                    </div>
                    <button class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-200" 
                            onclick="window.showActivation('${lesson.id}', '${lesson.title}')">
                        <i class="fas fa-shopping-cart"></i> إضافة
                    </button>
                `;
                grid.appendChild(div);
            });
            document.getElementById('step3').classList.remove('hidden');
            updateSidebar(3);
        }

        window.showActivation = (id, title) => {
            currentLessonId = id;
            document.getElementById('lessonNameLabel').innerText = `حصة: ${title}`;
            document.getElementById('step4').classList.remove('hidden');
            document.getElementById('step4').scrollIntoView({ behavior: 'smooth' });
        };

        function updateSidebar(step) {
            const steps = [1, 2, 3];
            steps.forEach(s => {
                const li = document.getElementById(`li-step${s}`);
                if(s === step) {
                    li.className = "flex items-center gap-3 text-blue-600 font-bold";
                } else if (s < step) {
                    li.className = "flex items-center gap-3 text-green-500 font-bold";
                    li.innerHTML = `<span class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center"><i class="fas fa-check text-xs"></i></span> تم الاختيار`;
                }
            });
        }

        // Activate Logic
        document.getElementById('activateBtn').onclick = async () => {
            const code = document.getElementById('activationCode').value;
            const status = document.getElementById('statusMsg');

            const { data } = await supabase.from('lesson_codes').select('*').eq('code', code).eq('lesson_id', currentLessonId).eq('is_used', false).single();

            if (data) {
                status.innerHTML = "✅ تم تفعيل الحصة! جاري توجيهك للمحتوى...";
                status.className = "mt-3 text-sm text-green-600 font-bold";
                // Update code status in DB here...
            } else {
                status.innerHTML = "❌ الكود غير صحيح أو مستخدم مسبقاً";
                status.className = "mt-3 text-sm text-red-600 font-bold";
            }
        };

        loadSubjects();
    </script>
</body>
</html>
