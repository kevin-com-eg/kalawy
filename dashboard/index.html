<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kalawy Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C8A96E; --gold-hover:#d4b77f; --green:#2D5A3D; --teal:#5BBFBF;
  --red:#e06c6c; --blue:#6EA7D4; --lime:#8EC86E; --violet:#A98EF0;
  --font-ar: 'Tajawal', sans-serif; --font-en: 'Inter', sans-serif;
  --transition: 0.3s ease;
}
html[lang="ar"] { font-family: var(--font-ar); }
html[lang="en"] { font-family: var(--font-en); }

[data-theme="dark"]{
  --bg:#0f1115; --card:#161920; --card-hover:#1c2028;
  --text:#f8f9fa; --sub:#a1a1aa; --muted:#71717a;
  --border:#272a33; --border-focus:#4b5060;
  --input:#0f1115; --nav:#161920ee; --shadow:rgba(0,0,0,0.3);
}
[data-theme="light"]{
  --bg:#f4f4f5; --card:#ffffff; --card-hover:#fafafa;
  --text:#18181b; --sub:#52525b; --muted:#a1a1aa;
  --border:#e4e4e7; --border-focus:#a1a1aa;
  --input:#f4f4f5; --nav:#ffffffee; --shadow:rgba(0,0,0,0.05);
}

html{scroll-behavior:smooth}
body{
  min-height:100vh; color:var(--text); background:var(--bg);
  overflow-x:hidden; transition: background var(--transition), color var(--transition);
}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer; outline:none;}
a{text-decoration:none; color:inherit}
.hide{display:none!important}

/* Layout */
.app{position:relative; z-index:1; display:grid; grid-template-columns:260px minmax(0,1fr); min-height:100vh}
.sidebar{
  position:sticky; top:0; height:100vh; padding:24px 20px; background:var(--nav); backdrop-filter:blur(10px);
  border-inline-end:1px solid var(--border); display:flex; flex-direction:column; gap:24px;
}
.logo{display:flex; align-items:center; gap:12px; padding-bottom:20px; border-bottom:1px solid var(--border)}
.logo-mark{width:40px; height:40px; border-radius:12px; background:var(--gold); display:grid; place-items:center;}
.logo-k{font-weight:800; font-size:1.4rem; color:#fff;}
.logo-title{font-weight:800; font-size:1.1rem; line-height:1}
.logo-sub{font-size:0.65rem; letter-spacing:1px; color:var(--muted); margin-top:4px; text-transform:uppercase}

/* Navigation */
.nav-list{display:flex; flex-direction:column; gap:8px}
.nav-btn{
  border:none; background:transparent; color:var(--sub); font-weight:700; font-size:0.95rem;
  padding:12px 16px; border-radius:12px; text-align:start; display:flex; align-items:center; gap:12px; transition:var(--transition);
}
.nav-btn:hover{background:var(--card-hover); color:var(--text)}
.nav-btn.active{background:rgba(200,169,110,0.1); color:var(--gold);}
.side-bottom{margin-top:auto; display:grid; gap:12px}
.pill{border:1px solid var(--border); background:var(--card); color:var(--sub); border-radius:999px; padding:10px 14px; font-size:0.8rem; font-weight:700; display:flex; align-items:center; gap:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

/* Main Area */
.main{min-width:0}
.topbar{
  position:sticky; top:0; z-index:5; background:var(--nav); backdrop-filter:blur(10px); border-bottom:1px solid var(--border);
  padding:16px 32px; display:flex; align-items:center; justify-content:space-between; gap:16px;
}
.top-title h1{font-size:1.4rem; font-weight:800}
.top-title p{color:var(--muted); font-size:0.85rem; margin-top:4px}
.actions{display:flex; align-items:center; gap:10px; flex-wrap:wrap}

/* Buttons */
.btn, .btn-red, .btn-gold, .btn-ok{
  border:1px solid var(--border); background:var(--card); color:var(--text); border-radius:10px;
  padding:10px 16px; font-weight:700; font-size:0.85rem; transition:var(--transition); display:inline-flex; align-items:center; justify-content:center; gap:8px;
}
.btn:hover{background:var(--border)}
.btn-gold{background:var(--gold); color:#111; border:none}
.btn-gold:hover{background:var(--gold-hover)}
.btn-red{background:rgba(224,108,108,0.1); color:var(--red); border-color:rgba(224,108,108,0.2)}
.btn-ok{background:rgba(142,200,110,0.1); color:var(--lime); border-color:rgba(142,200,110,0.2)}
.icon-btn{width:40px; height:40px; padding:0; border-radius:10px;}
.mobile-menu{display:none}

/* Content & Cards */
.content{padding:32px; display:grid; gap:24px}
.section{display:none; gap:24px; animation:fade 0.3s ease both}
.section.active{display:grid}
@keyframes fade{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)}}
.grid{display:grid; gap:20px}
.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid-3{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}

.card{
  background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px;
  box-shadow:0 10px 30px var(--shadow); transition:var(--transition);
}
.card:hover{border-color:var(--border-focus)}
.card-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px}
.card h2{font-size:1.1rem; font-weight:800}
.desc{color:var(--muted); font-size:0.85rem; line-height:1.6; margin-top:6px}

/* Stats */
.stat{position:relative; overflow:hidden}
.stat-icon{font-size:2rem; margin-bottom:16px}
.stat-num{font-size:2.2rem; font-weight:800; line-height:1}
.stat-label{color:var(--sub); font-weight:700; font-size:0.85rem; margin-top:8px}

/* Inputs */
.field{display:grid; gap:8px; margin-bottom:16px}
label{color:var(--sub); font-weight:700; font-size:0.8rem}
input,select,textarea{
  width:100%; border:1px solid var(--border); background:var(--input); color:var(--text);
  padding:12px 16px; border-radius:10px; font-size:0.9rem; transition:var(--transition);
}
input:focus,select:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(200,169,110,0.15)}

/* Lesson Cards */
.lesson-card{display:flex; flex-direction:column; min-height:100%; padding:20px}
.lesson-img{height:150px; border-radius:12px; background:var(--border); display:grid; place-items:center; overflow:hidden; margin-bottom:16px}
.lesson-img img{width:100%; height:100%; object-fit:cover}
.lesson-title{font-size:1.1rem; font-weight:800; margin-bottom:8px}
.lesson-meta{display:flex; flex-wrap:wrap; gap:8px; margin:12px 0}
.badge{display:inline-flex; align-items:center; border:1px solid var(--border); background:var(--input); border-radius:8px; padding:6px 10px; font-weight:700; font-size:0.75rem; color:var(--sub)}
.badge.ok{color:var(--lime); background:rgba(142,200,110,0.1); border-color:transparent}
.badge.bad{color:var(--red); background:rgba(224,108,108,0.1); border-color:transparent}
.badge.warn{color:#111; background:var(--gold); border-color:transparent}
.lesson-actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:auto; padding-top:16px}

/* Messages & Tables */
.msg{display:none; border-radius:12px; padding:16px; font-weight:700; font-size:0.9rem; margin-bottom:20px}
.msg.show{display:block}
.msg.ok{background:rgba(142,200,110,0.1); color:var(--lime); border:1px solid rgba(142,200,110,0.2)}
.msg.err{background:rgba(224,108,108,0.1); color:var(--red); border:1px solid rgba(224,108,108,0.2)}
.empty{padding:40px; text-align:center; color:var(--muted); font-weight:700; border:1px dashed var(--border); border-radius:16px}
.table-wrap{overflow-x:auto;}
table{width:100%; border-collapse:collapse; min-width:600px; text-align:start}
th,td{padding:16px; border-bottom:1px solid var(--border); font-size:0.9rem}
th{color:var(--muted); font-size:0.8rem; text-transform:uppercase}

@media(max-width:1050px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed; inset-inline-start:0; top:0; bottom:0; width:260px; z-index:30; transform:translateX(calc(110% * var(--rtl-mod, 1))); transition:transform 0.3s}
  html[dir="rtl"] .sidebar{--rtl-mod: 1;}
  html[dir="ltr"] .sidebar{--rtl-mod: -1;}
  .sidebar.open{transform:translateX(0)}
  .mobile-menu{display:inline-flex}
  .content{padding:20px}
  .grid-2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="app" class="app hide">
  <aside id="sidebar" class="sidebar">
    <div class="logo">
      <div class="logo-mark"><span class="logo-k">K</span></div>
      <div>
        <div class="logo-title">Kalawy</div>
        <div class="logo-sub" data-i18n="student">STUDENT</div>
      </div>
    </div>

    <div class="nav-list">
      <button class="nav-btn active" data-section="overview" onclick="showSection('overview')"><span data-i18n="navOverview">🏠 الرئيسية</span></button>
      <button class="nav-btn" data-section="lessons" onclick="showSection('lessons')"><span data-i18n="navLessons">🎬 كل الحصص</span></button>
      <button class="nav-btn" data-section="myLessons" onclick="showSection('myLessons')"><span data-i18n="navMyLessons">✅ حصصي</span></button>
      <button class="nav-btn" data-section="redeem" onclick="showSection('redeem')"><span data-i18n="navRedeem">🔑 تفعيل كود</span></button>
      <button class="nav-btn" data-section="exam" onclick="showSection('exam')"><span data-i18n="navExam">📝 الامتحان</span></button>
      <button class="nav-btn" data-section="results" onclick="showSection('results')"><span data-i18n="navResults">🏆 نتائجي</span></button>
      <button class="nav-btn" data-section="profile" onclick="showSection('profile')"><span data-i18n="navProfile">👤 حسابي</span></button>
    </div>

    <div class="side-bottom">
      <div class="pill">👤 <span id="studentEmail">Student</span></div>
      <button class="btn-red" onclick="logout()" data-i18n="logout">تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="btn icon-btn mobile-menu" onclick="toggleSidebar()">☰</button>
      <div class="top-title">
        <h1 id="pageTitle" data-i18n="pageTitleOverview">لوحة الطالب</h1>
        <p id="pageSub" data-i18n="pageSubOverview">تابع حصصك وامتحاناتك من مكان واحد.</p>
      </div>
      <div class="actions">
        <button class="btn" onclick="loadAll()" data-i18n="refresh">↻ تحديث</button>
        <button class="btn icon-btn" onclick="toggleLang()" id="langBtn">EN</button>
        <button class="btn icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
      </div>
    </header>

    <div class="content">
      <div id="globalMsg" class="msg"></div>

      <section id="overview" class="section active">
        <div class="grid grid-4">
          <div class="card stat"><div class="stat-icon">🎬</div><div id="countLessons" class="stat-num">0</div><div class="stat-label" data-i18n="statAllLessons">كل الحصص</div></div>
          <div class="card stat"><div class="stat-icon">✅</div><div id="countOwned" class="stat-num">0</div><div class="stat-label" data-i18n="statMyLessons">حصصي</div></div>
          <div class="card stat"><div class="stat-icon">🏆</div><div id="countResults" class="stat-num">0</div><div class="stat-label" data-i18n="statResults">نتائج</div></div>
          <div class="card stat"><div class="stat-icon">🎓</div><div id="studentGradeStat" class="stat-num" style="font-size:1.4rem">-</div><div class="stat-label" data-i18n="statGrade">الصف</div></div>
        </div>

        <div class="grid grid-2">
          <div class="card">
            <h2><span data-i18n="hello">أهلًا</span> <span id="studentNameHero">طالب</span> 👋</h2>
            <p class="desc" data-i18n="heroDesc">اختار الحصة من القائمة، أو فعّل كود اشتراك لو معاك كود من المدرس.</p>
            <div class="lesson-actions">
              <button class="btn-gold" onclick="showSection('lessons')" data-i18n="browseLessons">تصفح الحصص</button>
              <button class="btn" onclick="showSection('redeem')" data-i18n="navRedeem">تفعيل كود</button>
            </div>
          </div>
          <div class="card">
            <h2 data-i18n="latestLesson">آخر حصة مضافة</h2>
            <div id="latestLessonBox" class="desc">...</div>
          </div>
        </div>
      </section>
      
      <section id="lessons" class="section">
        <div class="card">
          <div class="card-head">
            <div>
              <h2 data-i18n="navLessons">كل الحصص</h2>
            </div>
          </div>
          <div id="lessonsGrid" class="grid grid-3"></div>
        </div>
      </section>

      <section id="myLessons" class="section">
        <div class="card">
          <div class="card-head">
            <div>
              <h2 data-i18n="navMyLessons">حصصي المفعّلة</h2>
            </div>
          </div>
          <div id="myLessonsGrid" class="grid grid-3"></div>
        </div>
      </section>

      <section id="redeem" class="section">
        <div class="grid grid-2">
          <div class="card">
            <h2 data-i18n="navRedeem">تفعيل كود</h2>
            <div class="field" style="margin-top:16px;">
              <input id="redeemCode" dir="ltr" placeholder="KALAWY-XXXX">
            </div>
            <button class="btn-gold" onclick="redeemCode()" data-i18n="activateBtn">تفعيل الكود</button>
          </div>
        </div>
      </section>

      <section id="exam" class="section"></section>
      <section id="results" class="section"></section>
      <section id="profile" class="section"></section>
    </div>
  </main>
</div>

<script>
// ---------- Translations Object ----------
const translations = {
  ar: {
    student: "STUDENT",
    navOverview: "🏠 الرئيسية", navLessons: "🎬 كل الحصص", navMyLessons: "✅ حصصي", navRedeem: "🔑 تفعيل كود", navExam: "📝 الامتحان", navResults: "🏆 نتائجي", navProfile: "👤 حسابي",
    logout: "تسجيل الخروج", refresh: "↻ تحديث",
    pageTitleOverview: "لوحة الطالب", pageSubOverview: "تابع حصصك وامتحاناتك من مكان واحد.",
    statAllLessons: "كل الحصص", statMyLessons: "حصصي", statResults: "نتائج", statGrade: "الصف",
    hello: "أهلًا", heroDesc: "اختار الحصة من القائمة، أو فعّل كود اشتراك.",
    browseLessons: "تصفح الحصص", latestLesson: "آخر حصة مضافة", activateBtn: "تفعيل الكود",
    buyText: "شراء", openText: "فتح الحصة", emptyLessons: "لا توجد حصص", activated: "مفعّلة", notActivated: "غير مفعّلة"
  },
  en: {
    student: "STUDENT",
    navOverview: "🏠 Overview", navLessons: "🎬 All Lessons", navMyLessons: "✅ My Lessons", navRedeem: "🔑 Redeem Code", navExam: "📝 Exam", navResults: "🏆 Results", navProfile: "👤 Profile",
    logout: "Logout", refresh: "↻ Refresh",
    pageTitleOverview: "Student Dashboard", pageSubOverview: "Manage your lessons and exams in one place.",
    statAllLessons: "All Lessons", statMyLessons: "My Lessons", statResults: "Results", statGrade: "Grade",
    hello: "Hello", heroDesc: "Choose a lesson from the list, or redeem a subscription code.",
    browseLessons: "Browse Lessons", latestLesson: "Latest Lesson", activateBtn: "Activate Code",
    buyText: "Buy", openText: "Open Lesson", emptyLessons: "No lessons found", activated: "Activated", notActivated: "Locked"
  }
};

let currentLang = localStorage.getItem("kalawy-lang") || "ar";

function toggleLang() {
  currentLang = currentLang === "ar" ? "en" : "ar";
  localStorage.setItem("kalawy-lang", currentLang);
  applyLang();
  if(state.lessons.length) renderAll(); // Re-render dynamic content
}

function t(key) {
  return translations[currentLang][key] || key;
}

function applyLang() {
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";
  document.getElementById("langBtn").textContent = currentLang === "ar" ? "EN" : "ع";
  
  // Update static texts
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if(translations[currentLang][key]) {
      el.textContent = translations[currentLang][key];
    }
  });
}

// ---------- Base Logic ----------
const SUPABASE_URL = "https://xjdhbbjeeasdmohbhgze.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_jcMmE0j0QAf9ii2AVD3N8Q_GKto6KYa";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const state = { user:null, profile:null, lessons:[], ownedIds:new Set(), results:[] };

const $ = id => document.getElementById(id);

async function init(){
  const theme = localStorage.getItem("kalawy-theme") || "dark";
  document.documentElement.setAttribute("data-theme", theme);
  $("themeBtn").textContent = theme === "dark" ? "🌙" : "☀️";
  applyLang();
  
  // Simulated Bypass for UI testing without auth block
  $("app").classList.remove("hide"); 
  $("studentEmail").textContent = "kevin.hany@student.com";
  $("studentNameHero").textContent = "Kevin";
  
  // You would call your actual checkStudent() here.
}

function toggleTheme(){
  const h = document.documentElement;
  const next = h.getAttribute("data-theme") === "dark" ? "light" : "dark";
  h.setAttribute("data-theme", next);
  localStorage.setItem("kalawy-theme", next);
  $("themeBtn").textContent = next === "dark" ? "🌙" : "☀️";
}

function toggleSidebar(){ $("sidebar").classList.toggle("open"); }

function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  $(id).classList.add("active");
  document.querySelector(`[data-section="${id}"]`)?.classList.add("active");
  $("sidebar").classList.remove("open");
}

function escapeHtml(v){ return String(v ?? "").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m])); }

function renderLessonCard(l){
  const owned = state.ownedIds.has(l.id);
  const img = l.image ? `<img src="${escapeHtml(l.image)}" alt="">` : `<span style="font-size:2.4rem">🎬</span>`;
  
  return `<div class="card lesson-card">
    <div class="lesson-img">${img}</div>
    <div class="lesson-title">${escapeHtml(l.name || "Lesson")}</div>
    <div class="lesson-meta">
      <span class="badge warn">${Number(l.price || 0)} EGP</span>
      ${owned ? `<span class="badge ok">${t('activated')}</span>` : `<span class="badge bad">${t('notActivated')}</span>`}
    </div>
    <div class="lesson-actions">
      ${owned ? `<button class="btn-ok">${t('openText')}</button>` : `<button class="btn-gold">${t('buyText')}</button>`}
    </div>
  </div>`;
}

function renderAll() {
    // Fill dummy data for preview
    const dummyLessons = [{id: 1, name: "Chemistry Ch1", price: 150}, {id: 2, name: "Physics Ch2", price: 120}];
    $("lessonsGrid").innerHTML = dummyLessons.map(renderLessonCard).join("");
    $("myLessonsGrid").innerHTML = `<div class="empty">${t('emptyLessons')}</div>`;
}

init();
</script>
</body>
</html>
