<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة كالاوى - لوحة الطالب</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 30px; }
        .step-card { border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 20px; }
        .step-card:last-child { border-bottom: none; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        select, input { width: 100%; padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 16px; transition: border 0.3s; box-sizing: border-box; }
        select:focus, input:focus { outline: none; border-color: var(--primary); }
        button { background-color: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; width: 100%; margin-top: 10px; transition: opacity 0.3s; }
        button:hover { opacity: 0.9; }
        .lessons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .lesson-btn { background: #f1f5f9; color: var(--text); border: 1px solid #cbd5e1; text-align: right; }
        .lesson-btn:hover { background: #e2e8f0; }
        .hidden { display: none; }
        .success-msg { color: #16a34a; font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>لوحة تحكم الطالب</h2>

    <div class="step-card" id="step1">
        <label>1. اختر المادة التعليمية:</label>
        <select id="subjectSelect">
            <option value="">جاري تحميل المواد...</option>
        </select>
    </div>

    <div class="step-card hidden" id="step2">
        <label>2. اختر المدرس:</label>
        <select id="teacherSelect">
            <option value="">-- اختر مدرس --</option>
        </select>
    </div>

    <div class="step-card hidden" id="step3">
        <label>3. الحصص المتاحة (اضغط للاختيار):</label>
        <div id="lessonsList" class="lessons-grid"></div>
    </div>

    <div class="step-card hidden" id="step4">
        <label id="targetLessonLabel">تفعيل الحصة:</label>
        <input type="text" id="activationCode" placeholder="أدخل كود التفعيل هنا...">
        <button id="activateBtn">تفعيل الحصة وفتح المحتوى</button>
        <div id="statusMsg"></div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    // الإعدادات الخاصة بك
    const SUPABASE_URL = 'https://xjdhbbjeeasdmohbhgze.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_jcMmE0j0QAf9ii2AVD3N8Q_GKto6KYa';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ربط العناصر
    const subjectSelect = document.getElementById('subjectSelect');
    const teacherSelect = document.getElementById('teacherSelect');
    const lessonsList = document.getElementById('lessonsList');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    const step4 = document.getElementById('step4');
    const activateBtn = document.getElementById('activateBtn');

    let currentLessonId = null;

    // 1. تحميل المواد فور فتح الصفحة
    async function init() {
        const { data, error } = await supabase.from('subjects').select('*');
        if (error) {
            console.error('Error fetching subjects:', error);
            return;
        }
        subjectSelect.innerHTML = '<option value="">-- اختر مادة --</option>';
        data.forEach(s => subjectSelect.add(new Option(s.name, s.id)));
    }

    // 2. تحديث المدرسين عند تغيير المادة
    subjectSelect.onchange = async () => {
        const subId = subjectSelect.value;
        if (!subId) return;

        const { data } = await supabase.from('teachers').select('*').eq('subject_id', subId);
        teacherSelect.innerHTML = '<option value="">-- اختر مدرس --</option>';
        data.forEach(t => teacherSelect.add(new Option(t.name, t.id)));
        
        step2.classList.remove('hidden');
        step3.classList.add('hidden');
        step4.classList.add('hidden');
    };

    // 3. تحديث الحصص عند اختيار المدرس
    teacherSelect.onchange = async () => {
        const tId = teacherSelect.value;
        if (!tId) return;

        const { data } = await supabase.from('lessons').select('*').eq('teacher_id', tId);
        lessonsList.innerHTML = '';
        data.forEach(lesson => {
            const btn = document.createElement('button');
            btn.className = 'lesson-btn';
            btn.innerText = `${lesson.title} (${lesson.price} ج.م)`;
            btn.onclick = () => {
                currentLessonId = lesson.id;
                document.getElementById('targetLessonLabel').innerText = `تفعيل حصة: ${lesson.title}`;
                step4.classList.remove('hidden');
                document.getElementById('statusMsg').innerText = '';
            };
            lessonsList.appendChild(btn);
        });
        step3.classList.remove('hidden');
    };

    // 4. منطق تفعيل الكود
    activateBtn.onclick = async () => {
        const codeInput = document.getElementById('activationCode').value;
        const statusMsg = document.getElementById('statusMsg');

        if (!codeInput) {
            alert('من فضلك أدخل كود التفعيل');
            return;
        }

        // البحث عن الكود وصلاحيته
        const { data: codeData, error } = await supabase
            .from('lesson_codes')
            .select('*')
            .eq('code', codeInput)
            .eq('lesson_id', currentLessonId)
            .eq('is_used', false)
            .single();

        if (error || !codeData) {
            statusMsg.innerHTML = '<p style="color:red;">عفواً، الكود غير صحيح أو مستخدم مسبقاً لهذه الحصة.</p>';
            return;
        }

        // تحديث حالة الكود (بما إننا في الـ Frontend، يفضل مستقبلاً استخدام RPC للأمان)
        const { error: updateErr } = await supabase
            .from('lesson_codes')
            .update({ is_used: true, used_at: new Date() })
            .eq('id', codeData.id);

        if (!updateErr) {
            statusMsg.innerHTML = '<p class="success-msg">✅ تم تفعيل الحصة بنجاح! جاري فتح المحتوى...</p>';
            // هنا تقدر توجه الطالب لصفحة الحصة أو تشغل الفيديو في الـ Electron loader بتاعك
        }
    };

    init();
</script>

</body>
</html>
