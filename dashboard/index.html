<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة كالاوى التعليمية - لوحة الطالب</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        select, input, button { padding: 10px; margin: 5px; width: 100%; max-width: 300px; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h2>مرحباً بك في لوحة التحكم</h2>

    <div class="card" id="step1">
        <h3>1. اختر المادة</h3>
        <select id="subjectSelect">
            <option value="">-- اختر مادة --</option>
        </select>
    </div>

    <div class="card hidden" id="step2">
        <h3>2. اختر المدرس</h3>
        <select id="teacherSelect">
            <option value="">-- اختر مدرس --</option>
        </select>
    </div>

    <div class="card hidden" id="step3">
        <h3>3. الحصص المتاحة</h3>
        <div id="lessonsList"></div>
    </div>

    <div class="card hidden" id="step4">
        <h3>4. تفعيل الحصة</h3>
        <p id="selectedLessonName"></p>
        <input type="text" id="activationCode" placeholder="أدخل كود الحصة هنا">
        <button id="activateBtn">تفعيل وفتح الحصة</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
