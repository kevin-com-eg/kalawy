<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kalawy · Lesson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
:root{
  --bg:#F5F0E8;--surface:#FAF7F2;--text:#2C2418;--muted:#9B8E7A;
  --accent:#7c3aed;--accent2:#5b21b6;--border:rgba(44,36,24,.1);
  --radius:12px;--shadow:0 8px 32px rgba(44,36,24,.1);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);margin:0;user-select:none;}
.hidden{display:none!important}
#loadingScreen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;}
.ld-mark{width:60px;height:60px;background:var(--accent);border-radius:15px;display:grid;place-items:center;color:#fff;font-weight:bold;font-size:1.5rem;}
#codeLockScreen{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.lock-card{width:100%;max-width:400px;background:var(--surface);border-radius:20px;padding:40px;text-align:center;box-shadow:var(--shadow);}
.lock-btn{width:100%;background:var(--accent);color:#fff;border:none;padding:15px;border-radius:12px;font-weight:700;cursor:pointer;margin-top:20px;}
nav{height:64px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);font-weight:bold;}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:grid;place-items:center;color:#fff;font-size:14px;}
main{max-width:1200px;margin:20px auto;padding:0 20px;}
.video-container{width:100%;aspect-ratio:16/9;background:#000;border-radius:20px;overflow:hidden;box-shadow:var(--shadow);}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="ld-mark">K</div>
  <div id="ldTxt">Verifying Access...</div>
</div>

<div id="codeLockScreen" class="hidden">
  <div class="lock-card">
    <div style="font-size:3rem">🔐</div>
    <h2>Course Locked</h2>
    <p>لم يتم تفعيل هذا الكود لهذا الحساب بعد. يرجى التفعيل من صفحة الدفع أولاً.</p>
    <button class="lock-btn" onclick="location.href='/checkout?lesson_id='+new URLSearchParams(location.search).get('id')">Go to Checkout →</button>
  </div>
</div>

<div id="lessonContent" class="hidden">
  <nav>
    <a class="logo" href="/">
      <div class="logo-mark">K</div>
      <span id="navTitle">KALAWY</span>
    </a>
    <div id="userPill" style="font-size:12px;color:var(--muted)"></div>
  </nav>
  <main>
    <div class="video-container" id="videoArea"></div>
    <h1 id="lessonName" style="margin-top:20px"></h1>
    <div id="lessonDesc" style="color:var(--muted)"></div>
  </main>
</div>

<script>
// ==========================================
// CONFIGURATION
// ==========================================
const SUPABASE_URL = "https://xjdhbbjeeasdmohbhgze.supabase.co";
const SUPABASE_ANON = "sb_publishable_jcMmE0j0QAf9ii2AVD3N8Q_GKto6KYa";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null;

async function init() {
  const lessonId = new URLSearchParams(location.search).get('id');
  if (!lessonId) return alert("No Lesson ID found.");

  // 1. التحقق من وجود جلسة دخول
  const { data: { session } } = await db.auth.getSession();
  if (!session) {
    // إذا لم يسجل دخول، نبحث في الـ localStorage كحل بديل (للطوارئ)
    if(localStorage.getItem("paid_lesson_" + lessonId) === "true") {
       loadLesson(lessonId); return;
    }
    location.href = "/login.html"; return;
  }

  currentUser = session.user;
  document.getElementById('userPill').textContent = currentUser.email;

  try {
    // 2. البحث في جدول codes عن تفعيل لهذا البريد ولهذه الحصة
    // جعلنا البحث أكثر مرونة ليتخطى أخطاء الـ unknown_user إذا وجدنا الكود المفعول
    const { data: codes, error } = await db.from('codes')
      .select('*')
      .eq('lessonid', lessonId)
      .eq('used', true) // يجب أن يكون تم استخدامه
      .eq('usedby', currentUser.email);

    if (codes && codes.length > 0) {
      loadLesson(lessonId);
    } else {
      // إذا لم يجد في الداتابيز، نفحص الـ localStorage (ربما تم التفعيل للتو)
      if (localStorage.getItem("paid_lesson_" + lessonId) === "true") {
        loadLesson(lessonId);
      } else {
        showLock();
      }
    }
  } catch (e) {
    showLock();
  }
}

async function loadLesson(id) {
  const { data: lesson } = await db.from('lessons').select('*').eq('id', id).single();
  if (!lesson) return;

  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('lessonContent').classList.remove('hidden');
  document.getElementById('lessonName').textContent = lesson.name;
  document.getElementById('navTitle').textContent = lesson.name;

  // تشغيل الفيديو (إذا كان يوتيوب)
  if (lesson.videos && lesson.videos.length > 0) {
    const vid = lesson.videos[0].url;
    const ytId = vid.match(/(?:youtu\.be\/|v=|embed\/)([^#&?]{11})/)?.[1];
    if (ytId) {
      document.getElementById('videoArea').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${ytId}" frameborder="0" allowfullscreen></iframe>`;
    }
  }
}

function showLock() {
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('codeLockScreen').classList.remove('hidden');
}

// البدء
init();
</script>
</body>
</html>
