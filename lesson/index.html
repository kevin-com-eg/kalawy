<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#1a73e8;--primary2:#4285f4;--green:#0f9d58;--red:#d93025;--gold:#f9ab00;--bg:#f8f9fa;--card:#fff;--border:#e8eaed;--text:#202124;--muted:#5f6368;--muted2:#9aa0a6;--radius:18px;--shadow:0 8px 30px rgba(0,0,0,.10);--sans:'Cairo',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}.fa,.fa-solid,.fas{font-family:"Font Awesome 6 Free"!important;font-weight:900!important}.fa-brands,.fab{font-family:"Font Awesome 6 Brands"!important}a{text-decoration:none;color:inherit}.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:66px;display:flex;align-items:center}.top-inner{width:min(1180px,100%);margin:auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}.logo{display:flex;align-items:center;gap:10px;font-weight:900}.logo-box{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;display:grid;place-items:center}.btn{border:none;border-radius:12px;padding:11px 16px;font-weight:900;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:8px}.btn-primary{background:var(--primary);color:#fff}.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--muted)}.btn-green{background:var(--green);color:#fff}.wrap{width:min(1180px,100%);margin:0 auto;padding:24px 20px 80px}.hero{background:linear-gradient(135deg,#111827,#1a73e8);border-radius:24px;padding:26px;color:#fff;box-shadow:var(--shadow);margin-bottom:22px;position:relative;overflow:hidden}.hero:before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 10% 30%,rgba(255,255,255,.12) 1px,transparent 1px),radial-gradient(circle at 90% 70%,rgba(255,255,255,.08) 1px,transparent 1px);background-size:28px 28px}.hero>*{position:relative}.crumb{font-size:.78rem;opacity:.8;font-weight:800;margin-bottom:8px}.title{font-size:1.8rem;font-weight:900;line-height:1.35}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.2);padding:6px 12px;border-radius:999px;font-size:.78rem;font-weight:900}.grid{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:20px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden}.card-h{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}.card-title{font-weight:900}.card-b{padding:18px}.player{background:#000;border-radius:16px;overflow:hidden;aspect-ratio:16/9;display:grid;place-items:center}.player iframe,.player video{width:100%;height:100%;border:0;background:#000}.empty{padding:50px 20px;text-align:center;color:var(--muted);font-weight:800}.video-list{display:flex;flex-direction:column;gap:10px}.video-item{width:100%;text-align:right;background:#f1f3f4;border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;font-family:inherit;font-weight:900;color:var(--muted);display:flex;align-items:center;justify-content:space-between;gap:8px}.video-item.active{background:#e8f0fe;color:var(--primary);border-color:#d2e3fc}.resource{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#f8f9fa;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}.resource .r-title{font-weight:900}.resource .r-sub{font-size:.75rem;color:var(--muted);font-weight:700;margin-top:2px;word-break:break-all}.exam-img{width:100%;border-radius:14px;border:1px solid var(--border);margin-top:12px;max-height:300px;object-fit:cover}.q-card{background:#f8f9fa;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}.q-title{font-weight:900;margin-bottom:6px}.q-text{color:var(--muted);font-weight:700;line-height:1.7}.q-img{width:100%;border-radius:12px;border:1px solid var(--border);margin-top:10px;max-height:260px;object-fit:contain;background:#fff}.q-answer{margin-top:8px;color:var(--green);font-weight:900;font-size:.85rem}.lock{background:#fff;border:1px solid var(--border);border-radius:22px;padding:40px 20px;text-align:center;box-shadow:var(--shadow);max-width:520px;margin:50px auto}.lock i{font-size:2rem;color:var(--red);margin-bottom:12px}.lock h2{font-size:1.3rem;margin-bottom:8px}.lock p{color:var(--muted);font-weight:700;margin-bottom:18px}@media(max-width:900px){.grid{grid-template-columns:1fr}.title{font-size:1.35rem}.top-inner{padding:0 12px}.wrap{padding:16px 12px 70px}.hero{padding:20px}.top .btn span{display:none}}
</style>
</head>
<body>
<nav class="top"><div class="top-inner"><a class="logo" href="/dashboard"><div class="logo-box">K</div><div>Kalawy <span style="color:var(--primary)">EDU</span></div></a><button class="btn btn-ghost" onclick="location.href='/dashboard'"><i class="fa-solid fa-arrow-right"></i><span>رجوع للداشبورد</span></button></div></nav>
<div class="wrap" id="app"><div class="empty">جاري تحميل الحصة...</div></div>
<script>
const SUPABASE_URL="https://xjdhbbjeeasdmohbhgze.supabase.co";
const SUPABASE_KEY="sb_publishable_jcMmE0j0QAf9ii2AVD3N8Q_GKto6KYa";
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const $=id=>document.getElementById(id);
function safe(v){return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function titleOf(l){return l?.name||l?.title||l?.lesson_name||'حصة';}
function chapterOf(l){return l?.chapter||l?.chapter_name||'عام';}
function parseVideos(l){
  const vals=[];
  [l?.videos,l?.video_urls,l?.video_url,l?.video].forEach(v=>{
    if(!v)return;
    if(Array.isArray(v)) vals.push(...v);
    else if(typeof v==='object') vals.push(v);
    else if(typeof v==='string'){
      try{const p=JSON.parse(v);if(Array.isArray(p))vals.push(...p);else vals.push(v)}catch{vals.push(...v.split(/\n|,/).map(x=>x.trim()).filter(Boolean))}
    }
  });
  const out=[];
  vals.forEach((x,i)=>{
    if(!x)return;
    if(typeof x==='object'){
      const url=String(x.url||x.src||x.link||'').trim();
      if(url) out.push({title:x.title||x.name||`فيديو ${i+1}`,url,duration:x.duration||x.duration_minutes||0});
    } else {
      const url=String(x).trim(); if(url) out.push({title:`فيديو ${i+1}`,url,duration:0});
    }
  });
  const seen=new Set();
  return out.filter(v=>{if(seen.has(v.url))return false;seen.add(v.url);return true;});
}
function parseArray(v){ if(Array.isArray(v))return v; if(typeof v==='string'&&v.trim()){try{const p=JSON.parse(v);return Array.isArray(p)?p:[]}catch{return []}} return []; }
function examQuestionsOf(l){ return parseArray(l?.exam_questions||l?.questions||[]); }
function accessDaysOf(l){ return Number(l?.access_days||l?.validity_days||l?.available_days||0); }
function codeStartDate(c){ return c?.used_at||c?.updated_at||c?.created_at||null; }
function codeAccessDays(c,l){ return Number(c?.access_days||c?.validity_days||accessDaysOf(l)||0); }
function pdfOf(l){return l?.pdf_url||l?.pdf||l?.pdf_link||''}
function examLinkOf(l){return l?.exam_link||l?.exam_url||l?.exam||''}
function examImageOf(l){return l?.exam_image_url||l?.exam_image||l?.exam_thumb||''}
function isUsed(c){return c?.used===true||c?.is_used===true||String(c?.used).toLowerCase()==='true'||String(c?.is_used).toLowerCase()==='true'}
function usedBy(c){return String(c?.usedby||c?.used_by||c?.user_email||c?.email||c?.student_email||'').toLowerCase()}
function codeLessonId(c){return String(c?.lessonid||c?.lesson_id||c?.lesson||'')}
function embedUrl(url){url=String(url||'').trim();if(!url)return'';try{const u=new URL(url);if(u.hostname.includes('youtu.be'))return 'https://www.youtube.com/embed/'+u.pathname.slice(1);if(u.hostname.includes('youtube.com')){const id=u.searchParams.get('v');if(id)return 'https://www.youtube.com/embed/'+id;if(u.pathname.includes('/embed/'))return url;}if(u.hostname.includes('drive.google.com')){const m=url.match(/\/d\/([^/]+)/)||url.match(/[?&]id=([^&]+)/);if(m)return 'https://drive.google.com/file/d/'+m[1]+'/preview';}}catch(e){}return url}
function isDirectVideo(url){return /\.(mp4|webm|ogg)(\?|#|$)/i.test(url)}
function renderPlayer(url,idx){const box=$('playerBox');const src=embedUrl(url);document.querySelectorAll('.video-item').forEach((b,i)=>b.classList.toggle('active',i===idx));if(!src){box.innerHTML='<div class="empty">لا يوجد فيديو</div>';return;}if(isDirectVideo(src)){box.innerHTML=`<video src="${safe(src)}" controls controlsList="nodownload" playsinline></video>`;}else{box.innerHTML=`<iframe src="${safe(src)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen></iframe>`;}}
async function getAccess(lesson,user){
  if(!lesson) return {ok:false,reason:'missing'};
  if(!lesson.price||Number(lesson.price)===0) return {ok:true,free:true};
  if(localStorage.getItem('paid_lesson_'+lesson.id)==='true') return {ok:true,local:true};
  try{
    const {data}=await db.from('codes').select('*').or(`lessonid.eq.${lesson.id},lesson_id.eq.${lesson.id}`);
    const email=String(user.email||'').toLowerCase();
    const codes=(data||[]).filter(c=>isUsed(c)&&usedBy(c)===email&&codeLessonId(c)===String(lesson.id));
    if(!codes.length) return {ok:false,reason:'locked'};
    codes.sort((a,b)=>new Date(codeStartDate(b)||0)-new Date(codeStartDate(a)||0));
    const c=codes[0];
    const days=codeAccessDays(c,lesson);
    const start=codeStartDate(c);
    if(days>0&&start){
      const expiresAt=new Date(new Date(start).getTime()+days*86400000);
      const daysLeft=Math.ceil((expiresAt-new Date())/86400000);
      if(daysLeft<=0) return {ok:false,reason:'expired',expiresAt,daysLeft:0};
      return {ok:true,expiresAt,daysLeft};
    }
    return {ok:true};
  }catch(e){return {ok:false,reason:'error',message:e.message};}
}
async function init(){const id=new URLSearchParams(location.search).get('id');if(!id){$('app').innerHTML='<div class="lock"><i class="fa-solid fa-triangle-exclamation"></i><h2>لا يوجد رقم حصة</h2></div>';return;}const {data:{session}}=await db.auth.getSession();if(!session){location.href='/login.html';return;}const {data:lesson,error}=await db.from('lessons').select('*, teachers(*), subjects(*)').eq('id',id).maybeSingle();if(error||!lesson){$('app').innerHTML='<div class="lock"><i class="fa-solid fa-triangle-exclamation"></i><h2>الحصة غير موجودة</h2><p>اتأكد من الرابط.</p></div>';return;}const access=await getAccess(lesson,session.user);if(!access.ok){const expired=access.reason==='expired';$('app').innerHTML=`<div class="lock"><i class="fa-solid fa-lock"></i><h2>${expired?'انتهت مدة الحصة':'الحصة غير مفعّلة'}</h2><p>${expired?'وقت الحصة خلص. فعّل كود جديد عشان تفتحها تاني.':'اشتري الحصة أو فعّل الكود الأول.'}</p><button class="btn btn-primary" onclick="location.href='/checkout?lesson_id=${safe(id)}'">${expired?'تجديد':'الذهاب للدفع'}</button></div>`;return;}const videos=parseVideos(lesson);const pdf=pdfOf(lesson);const exam=examLinkOf(lesson);const examImg=examImageOf(lesson);const examQuestions=examQuestionsOf(lesson);const teacher=lesson.teachers?.name||lesson.teacher_name||'';$('app').innerHTML=`
  <section class="hero"><div class="crumb">${safe(chapterOf(lesson))}${teacher?' • '+safe(teacher):''}</div><h1 class="title">${safe(titleOf(lesson))}</h1><div class="meta"><span class="badge"><i class="fa-solid fa-video"></i>${videos.length} فيديو</span>${pdf?'<span class="badge"><i class="fa-solid fa-file-pdf"></i>PDF</span>':''}${(exam||examImg||examQuestions.length)?`<span class="badge"><i class="fa-solid fa-clipboard-question"></i>امتحان ${examQuestions.length?examQuestions.length:''}</span>`:''}${access.daysLeft?`<span class="badge"><i class="fa-solid fa-clock"></i>متبقي ${access.daysLeft} يوم</span>`:''}</div></section>
  <div class="grid"><main class="card"><div class="card-h"><div class="card-title">مشاهدة الحصة</div><span style="color:var(--muted);font-weight:800;font-size:.8rem" id="videoNow"></span></div><div class="card-b"><div class="player" id="playerBox"><div class="empty">اختار فيديو</div></div>${(lesson.about||lesson.description)?`<p style="color:var(--muted);font-weight:700;line-height:1.8;margin-top:16px">${safe(lesson.about||lesson.description)}</p>`:''}</div></main><aside><div class="card"><div class="card-h"><div class="card-title">فيديوهات الحصة</div></div><div class="card-b"><div class="video-list">${videos.length?videos.map((v,i)=>`<button class="video-item" onclick="renderPlayer('${safe(v.url).replace(/'/g,'&#39;')}',${i});$('videoNow').textContent='${safe(v.title||('فيديو '+(i+1))).replace(/'/g,'&#39;')}'"><span>${safe(v.title||('فيديو '+(i+1)))}</span><i class="fa-solid fa-play"></i></button>`).join(''):'<div class="empty">لا توجد فيديوهات</div>'}</div></div></div><div class="card" style="margin-top:16px"><div class="card-h"><div class="card-title">المرفقات</div></div><div class="card-b">${pdf?`<div class="resource"><div><div class="r-title">ملف PDF</div><div class="r-sub">${safe(pdf)}</div></div><a class="btn btn-primary" href="${safe(pdf)}" target="_blank">فتح</a></div>`:''}${exam?`<div class="resource"><div><div class="r-title">رابط الامتحان</div><div class="r-sub">${safe(exam)}</div></div><a class="btn btn-green" href="${safe(exam)}" target="_blank">دخول</a></div>`:''}${examImg?`<div class="resource"><div><div class="r-title">صورة الامتحان</div><div class="r-sub">اضغط لفتح الصورة</div></div><a class="btn btn-ghost" href="${safe(examImg)}" target="_blank">فتح</a></div><img class="exam-img" src="${safe(examImg)}" alt="exam image">`:''}${examQuestions.length?`<div style="margin-top:14px"><div class="card-title" style="margin-bottom:10px">أسئلة الامتحان</div>${examQuestions.map((q,i)=>`<div class="q-card"><div class="q-title">سؤال ${i+1}</div>${q.text||q.question?`<div class="q-text">${safe(q.text||q.question)}</div>`:''}${q.image_url||q.image?`<img class="q-img" src="${safe(q.image_url||q.image)}" alt="question">`:''}${q.answer?`<div class="q-answer">الإجابة: ${safe(q.answer)}</div>`:''}</div>`).join('')}</div>`:''}${(!pdf&&!exam&&!examImg&&!examQuestions.length)?'<div class="empty">لا توجد مرفقات</div>':''}</div></div></aside></div>`;if(videos[0]){renderPlayer(videos[0].url,0);$('videoNow').textContent=videos[0].title||'فيديو 1';}}
init();
</script>
</body>
</html>
