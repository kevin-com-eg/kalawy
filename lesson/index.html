<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>kalawy — الحصة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ═══════════ VARIABLES ═══════════ */
:root{--accent:#00c896;--accent2:#0099ff;--glow:rgba(0,200,150,.22);--gold:#f5c76e;--danger:#ff6b6b;--r:14px;--r-sm:10px;--r-lg:22px;--r-xl:30px;}
[data-theme="dark"]{--bg:#060e0a;--bg2:#091410;--glass:rgba(255,255,255,.05);--glass-h:rgba(255,255,255,.09);--gb:rgba(255,255,255,.09);--gb-h:rgba(255,255,255,.18);--shine:rgba(255,255,255,.05);--shadow:0 8px 32px rgba(0,0,0,.55);--shadow-lg:0 20px 60px rgba(0,0,0,.65);--text:#eef4ee;--t2:#8aaa90;--t3:#4a6a50;--orb1:rgba(0,200,150,.1);--orb2:rgba(0,153,255,.08);}
[data-theme="light"]{--bg:#eaf5ef;--bg2:#ddeee5;--glass:rgba(255,255,255,.6);--glass-h:rgba(255,255,255,.8);--gb:rgba(255,255,255,.85);--gb-h:rgba(255,255,255,.95);--shine:rgba(255,255,255,.7);--shadow:0 8px 32px rgba(0,60,30,.1);--shadow-lg:0 20px 60px rgba(0,60,30,.18);--text:#0a1a10;--t2:#2a5a38;--t3:#6a9a78;--orb1:rgba(0,200,150,.15);--orb2:rgba(0,153,255,.12);}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;overflow-x:hidden}
.hidden{display:none!important}

/* ═══════════ BG ORBS ═══════════ */
.bg-c{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 13s ease-in-out infinite}
.o1{width:500px;height:500px;background:var(--orb1);top:-120px;right:-80px}
.o2{width:400px;height:400px;background:var(--orb2);bottom:-80px;left:-80px;animation-delay:-5s}
@keyframes drift{0%,100%{transform:translate(0,0)}40%{transform:translate(25px,-35px)}70%{transform:translate(-20px,25px)}}

/* ═══════════ GLASS ═══════════ */
.gl{background:var(--glass);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--gb);box-shadow:var(--shadow);position:relative;overflow:hidden}
.gl::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--shine) 0%,transparent 55%);pointer-events:none;border-radius:inherit}

/* ═══════════ NAV ═══════════ */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;height:64px;background:rgba(6,14,10,.88);backdrop-filter:blur(28px);border-bottom:1px solid var(--gb);display:flex;align-items:center;padding:0 22px;gap:14px}
[data-theme="light"] .nav{background:rgba(234,245,239,.88)}
.nav-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-weight:900;font-size:.82rem;color:#fff;box-shadow:0 4px 12px var(--glow);flex-shrink:0;cursor:pointer}
.nav-wm{font-weight:900;font-size:1rem;letter-spacing:-.02em;cursor:pointer}
.nav-wm em{font-style:normal;color:var(--gold)}
.nav-sp{flex:1}
.nav-ctrls{display:flex;gap:8px;align-items:center}
.back-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-sm);border:1px solid var(--gb);background:var(--glass);backdrop-filter:blur(10px);color:var(--t2);font-weight:700;font-size:.82rem;cursor:pointer;transition:.15s}
.back-btn:hover{color:var(--text);border-color:var(--gb-h)}
.tpill{display:flex;gap:2px;background:var(--glass);border:1px solid var(--gb);border-radius:999px;padding:3px}
.topt{padding:5px 10px;border-radius:999px;border:none;background:transparent;color:var(--t3);font-weight:700;font-size:.74rem;cursor:pointer;transition:.15s}
.topt.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}

/* ═══════════ MAIN ═══════════ */
.main{padding-top:64px;max-width:1100px;margin:0 auto;padding-left:22px;padding-right:22px;padding-bottom:40px;position:relative;z-index:1}

/* ═══════════ LESSON HEADER ═══════════ */
.lesson-header{border-radius:var(--r-xl);padding:24px 28px;margin:24px 0 20px;background:linear-gradient(135deg,rgba(0,200,150,.1),rgba(0,153,255,.07));position:relative;overflow:hidden}
.lesson-header::after{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,var(--glow),transparent 70%);pointer-events:none}
.lh-chapter{font-size:.74rem;color:var(--t3);margin-bottom:4px;z-index:1;position:relative}
.lh-title{font-size:1.5rem;font-weight:900;letter-spacing:-.03em;z-index:1;position:relative}
.lh-meta{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;z-index:1;position:relative}
.lh-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:.76rem;font-weight:700;background:var(--glass);border:1px solid var(--gb);backdrop-filter:blur(10px)}

/* ═══════════ TABS ═══════════ */
.lesson-tabs{display:flex;gap:4px;background:var(--glass);border:1px solid var(--gb);border-radius:var(--r-lg);padding:4px;margin-bottom:20px;backdrop-filter:blur(10px)}
.lt{flex:1;padding:10px;border:none;border-radius:var(--r-sm);background:transparent;color:var(--t3);font-weight:700;font-size:.88rem;cursor:pointer;transition:.18s;display:flex;align-items:center;justify-content:center;gap:7px}
.lt:hover{color:var(--text);background:rgba(255,255,255,.04)}
.lt.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px var(--glow)}

/* ═══════════════════════════════════════════════
   CUSTOM VIDEO PLAYER
═══════════════════════════════════════════════ */
.vplayer-wrap{border-radius:var(--r-xl);overflow:hidden}
.vp-layout{display:grid;grid-template-columns:1fr 280px;min-height:500px}

/* Parts sidebar */
.vp-sidebar{border-right:1px solid var(--gb);display:flex;flex-direction:column;overflow:hidden}
.vp-sidebar-title{padding:14px 16px;font-weight:800;font-size:.88rem;border-bottom:1px solid var(--gb);color:var(--t2)}
.vp-parts{overflow-y:auto;flex:1}
.vp-part{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;transition:.15s;border-bottom:1px solid var(--gb)}
.vp-part:last-child{border-bottom:none}
.vp-part:hover{background:rgba(255,255,255,.03)}
.vp-part.on{background:rgba(0,200,150,.07);border-left:3px solid var(--accent)}
.vp-pnum{width:30px;height:30px;border-radius:50%;background:var(--glass);border:1px solid var(--gb);display:grid;place-items:center;font-size:.74rem;font-weight:700;flex-shrink:0;transition:.15s}
.vp-part.on .vp-pnum{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 3px 10px var(--glow)}
.vp-ptitle{font-size:.86rem;font-weight:600;flex:1;line-height:1.4}
.vp-now{font-size:.65rem;color:var(--accent);font-weight:700}

/* Player area */
.vp-main{display:flex;flex-direction:column}

/* ── The actual protected player ── */
.cplayer{position:relative;width:100%;aspect-ratio:16/9;background:#000;overflow:hidden}
.cplayer #yt-player-el{position:absolute;inset:0;width:100%;height:100%}
.cplayer #yt-player-el iframe{width:100%;height:100%;border:none;display:block}

/* Click guard — sits on top of iframe, blocks right-click / drag, relays play/pause */
.yt-guard{position:absolute;inset:0;z-index:10;cursor:pointer;background:transparent}

/* Controls overlay */
.pc{
  position:absolute;inset:0;z-index:20;
  display:flex;flex-direction:column;justify-content:flex-end;
  background:linear-gradient(transparent 0%,transparent 40%,rgba(0,0,0,.75) 100%);
  opacity:1;transition:opacity .35s;
  pointer-events:none;
}
.pc.hide{opacity:0}
.pc > *{pointer-events:auto}

/* Big center play/pause flash */
.pc-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;background:rgba(0,200,150,.85);display:flex;align-items:center;justify-content:center;font-size:1.9rem;opacity:0;transition:opacity .2s;pointer-events:none;backdrop-filter:blur(10px)}
.pc-flash.show{opacity:1}

/* Top info bar */
.pc-top{padding:14px 18px 0;display:flex;align-items:center;gap:10px}
.pc-top-title{font-size:.88rem;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Bottom controls */
.pc-bottom{padding:0 12px 10px;display:flex;flex-direction:column;gap:6px}

/* Progress bar */
.pc-progress{height:18px;display:flex;align-items:center;cursor:pointer;padding:6px 0;position:relative}
.pc-track{width:100%;height:4px;background:rgba(255,255,255,.25);border-radius:999px;overflow:hidden;transition:height .15s;position:relative}
.pc-progress:hover .pc-track{height:6px}
.pc-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;pointer-events:none;transition:width .1s linear}
.pc-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:var(--accent);box-shadow:0 2px 8px rgba(0,200,150,.5);opacity:0;transition:opacity .15s;pointer-events:none}
.pc-progress:hover .pc-thumb{opacity:1}

/* Controls row */
.pc-row{display:flex;align-items:center;gap:8px}
.pc-btn{background:none;border:none;color:#fff;cursor:pointer;padding:5px 7px;border-radius:8px;font-size:1.05rem;transition:.15s;display:flex;align-items:center;justify-content:center;line-height:1}
.pc-btn:hover{background:rgba(255,255,255,.12)}
.pc-time{font-family:'Inter',monospace;font-size:.76rem;color:rgba(255,255,255,.9);white-space:nowrap;min-width:100px;letter-spacing:.03em}
.pc-spacer{flex:1}

/* Speed & Quality selects */
.pc-ctrl{display:flex;align-items:center;gap:4px}
.pc-lbl{font-size:.65rem;color:rgba(255,255,255,.5);font-weight:700;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.pc-sel{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:7px;padding:4px 8px;font-size:.75rem;font-weight:700;cursor:pointer;outline:none;transition:.15s;font-family:'Tajawal',sans-serif}
.pc-sel:hover{border-color:rgba(0,200,150,.5);background:rgba(0,0,0,.8)}
.pc-sel option{background:#111;color:#fff}
.pc-vol{width:70px;height:4px;border-radius:999px;accent-color:var(--accent);cursor:pointer}

/* Video bottom info bar */
.vp-info{padding:14px 18px;border-top:1px solid var(--gb);display:flex;align-items:center;gap:14px}
.vp-info-title{font-weight:800;font-size:.95rem;flex:1}
.vp-nav-btns{display:flex;gap:8px}

/* AdBlock / DevTools overlays */
.shield-overlay{
  position:absolute;inset:0;z-index:100;
  background:rgba(6,14,10,.96);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;text-align:center;padding:30px;
  border-radius:inherit;
}
.so-ico{font-size:3.5rem;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.so-title{font-size:1.2rem;font-weight:900;color:var(--danger)}
.so-sub{font-size:.85rem;color:var(--t2);line-height:1.75;max-width:340px}
.so-sub strong{color:var(--gold)}
.so-steps{background:rgba(255,255,255,.04);border:1px solid var(--gb);border-radius:var(--r-sm);padding:14px 18px;text-align:right;direction:rtl;font-size:.82rem;line-height:2;color:var(--t2)}
.so-steps b{color:var(--text)}

/* ═══════════ SINGLE VIDEO ═══════════ */
.vp-single .cplayer{aspect-ratio:16/9}

/* ═══════════ EXAM ═══════════ */
.exam-wrap{border-radius:var(--r-xl);overflow:hidden}
.exam-intro{padding:32px;text-align:center}
.ei-ico{font-size:3.5rem;margin-bottom:12px}
.ei-title{font-size:1.4rem;font-weight:900;margin-bottom:8px}
.ei-sub{font-size:.88rem;color:var(--t3);margin-bottom:20px;line-height:1.6}
.ei-meta{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:24px}
.ei-met{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:999px;font-size:.82rem;font-weight:700;background:var(--glass);border:1px solid var(--gb)}
.exam-body{padding:24px}
.q-card{border:1px solid var(--gb);border-radius:var(--r-lg);padding:22px;margin-bottom:16px}
.q-num-lbl{font-size:.68rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.q-txt{font-weight:700;font-size:.98rem;margin-bottom:14px;line-height:1.65}
.q-img{width:100%;max-height:220px;object-fit:contain;border-radius:12px;margin-bottom:14px;display:block;border:1px solid var(--gb)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{display:flex;align-items:center;gap:11px;padding:13px 16px;border-radius:var(--r-sm);border:1px solid var(--gb);background:var(--bg2);cursor:pointer;transition:.2s;user-select:none}
.opt:hover{border-color:rgba(0,200,150,.35);background:rgba(0,200,150,.05)}
.opt.sel{border-color:var(--accent);background:rgba(0,200,150,.1)}
.opt.correct{border-color:var(--accent)!important;background:rgba(0,200,150,.15)!important;pointer-events:none}
.opt.wrong{border-color:var(--danger)!important;background:rgba(255,107,107,.1)!important;pointer-events:none}
.opt.neutral{pointer-events:none}
.opt-c{width:24px;height:24px;border-radius:50%;border:2px solid var(--gb-h);display:grid;place-items:center;font-size:.68rem;font-weight:700;flex-shrink:0;transition:.15s}
.opt.sel .opt-c{background:var(--accent);border-color:var(--accent);color:#fff}
.opt.correct .opt-c{background:var(--accent);border-color:var(--accent);color:#fff}
.opt.wrong .opt-c{background:var(--danger);border-color:var(--danger);color:#fff}
.opt-t{font-size:.88rem;font-weight:600}
.exam-footer{padding:20px 24px;border-top:1px solid var(--gb);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.exam-prog{display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--t3)}
.exam-prog-bar{width:140px;height:6px;background:var(--gb);border-radius:999px;overflow:hidden}
.exam-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .3s}

/* ═══════════ RESULT ═══════════ */
.result-card{border-radius:var(--r-xl);padding:36px;text-align:center}
.res-ico{font-size:4rem;margin-bottom:14px;display:block}
.res-score{font-size:4rem;font-weight:900;letter-spacing:-.05em;line-height:1;margin:8px 0}
.res-pass{color:var(--accent)}.res-fail{color:var(--danger)}
.res-label{font-size:1.1rem;font-weight:800;margin-bottom:6px}
.res-detail{font-size:.85rem;color:var(--t3);margin-bottom:24px}
.res-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ═══════════ CONTENT ═══════════ */
.content-section{border-radius:var(--r-xl);overflow:hidden}
.content-item{border-bottom:1px solid var(--gb)}
.content-item:last-child{border-bottom:none}
.ci-head{padding:14px 20px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:.88rem;border-bottom:1px solid var(--gb);background:rgba(255,255,255,.02)}
.ci-body{padding:18px 20px}
.pdf-link{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border-radius:var(--r-sm);color:#60a5fa;font-weight:700;text-decoration:none;transition:.15s;border:1px solid var(--gb)}
.pdf-link:hover{background:rgba(0,153,255,.08);border-color:rgba(0,153,255,.25)}
.img-c{width:100%;border-radius:var(--r-sm);display:block;border:1px solid var(--gb)}
.txt-c{line-height:1.9;font-size:.95rem;color:var(--text);user-select:text}

/* ═══════════ UTIL ═══════════ */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--t3)}
.empty-pg{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--t3);text-align:center}
.ld{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
[data-theme="light"] .ld{border:3px solid rgba(0,0,0,.08);border-top-color:var(--accent)}
@keyframes spin{to{transform:rotate(360deg)}}

.btn{border:none;border-radius:var(--r-sm);padding:11px 20px;font-weight:700;cursor:pointer;font-size:.9rem;transition:.18s;display:inline-flex;align-items:center;gap:7px;font-family:'Tajawal',sans-serif}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 5px 18px var(--glow)}
.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-p:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-gl{background:var(--glass);color:var(--t2);border:1px solid var(--gb);backdrop-filter:blur(10px)}
.btn-gl:hover{color:var(--text);border-color:var(--gb-h)}
.btn-lg{padding:14px 32px;font-size:1rem;border-radius:var(--r-lg)}

#toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{display:flex;gap:10px;align-items:center;background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--gb);border-radius:14px;padding:11px 18px;box-shadow:var(--shadow-lg);animation:tin .22s ease;pointer-events:all;white-space:nowrap;font-weight:700;font-size:.87rem}
.ts{border-color:rgba(0,200,150,.35)}.te{border-color:rgba(255,107,107,.35)}.tw{border-color:rgba(245,199,110,.35)}.ti{border-color:rgba(0,153,255,.35)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes tout{to{opacity:0;transform:translateY(8px)}}
.tx{animation:tout .2s ease forwards}

.timer-bar{position:fixed;top:64px;left:0;right:0;z-index:150;height:4px;background:var(--gb)}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s linear}
.timer-chip{position:fixed;top:74px;left:50%;transform:translateX(-50%);z-index:151;background:var(--bg2);border:1px solid var(--gb);border-radius:999px;padding:5px 14px;font-size:.8rem;font-weight:700;font-family:monospace;display:flex;align-items:center;gap:6px;backdrop-filter:blur(10px)}
.timer-chip.warn{color:var(--danger);border-color:rgba(255,107,107,.3)}

/* ═══════════ DEVTOOLS GLOBAL OVERLAY ═══════════ */
#dt-overlay{
  display:none;position:fixed;inset:0;z-index:999999;
  background:rgba(2,8,4,.98);backdrop-filter:blur(20px);
  flex-direction:column;align-items:center;justify-content:center;
  gap:18px;text-align:center;padding:30px;
}
.dto-icon{font-size:5rem}
.dto-title{font-size:1.6rem;font-weight:900;color:var(--danger);letter-spacing:-.03em}
.dto-sub{font-size:.92rem;color:var(--t2);line-height:1.8;max-width:380px}
.dto-warn{padding:12px 20px;background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.2);border-radius:var(--r-sm);font-size:.82rem;color:var(--t3)}

@media(max-width:760px){
  .vp-layout{grid-template-columns:1fr;grid-template-rows:auto auto}
  .vp-sidebar{border-right:none;border-top:1px solid var(--gb);max-height:200px}
  .opts{grid-template-columns:1fr}
  .main{padding-left:14px;padding-right:14px}
  .lh-title{font-size:1.2rem}
  .res-score{font-size:3rem}
  .pc-ctrl .pc-lbl{display:none}
}
</style>
</head>
<body>

<!-- ═══ DevTools Overlay (global) ═══ -->
<div id="dt-overlay">
  <div class="dto-icon">🚫</div>
  <div class="dto-title">تم اكتشاف أدوات المطور</div>
  <div class="dto-sub">يتم إيقاف الفيديو تلقائياً عند فتح أدوات المطور. أغلقها للمتابعة.</div>
  <div class="dto-warn">DevTools Detected — Video paused for security</div>
</div>

<!-- ═══ BG ═══ -->
<div class="bg-c" aria-hidden="true">
  <div class="orb o1"></div><div class="orb o2"></div>
</div>
<div id="toasts"></div>
<div id="timer-bar-wrap" class="hidden"><div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div><div class="timer-chip" id="timer-chip">⏱️ --:--</div></div>

<!-- ═══ NAV ═══ -->

/* ══════════════════════════════════════════════════════════
   ██████  SECURITY LAYER  ██████
   ══════════════════════════════════════════════════════════ */
(function(){
  /* 1. Disable right-click everywhere */
  document.addEventListener('contextmenu', e => { e.preventDefault(); return false; }, true);

  /* 2. Block DevTools keyboard shortcuts */
  document.addEventListener('keydown', e => {
    const key = e.key.toUpperCase();
    const blocked =
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && ['I','J','C','K'].includes(key)) ||
      (e.ctrlKey && ['U','S'].includes(key)) ||
      (e.metaKey && e.altKey && ['I','J'].includes(key));
    if(blocked){ e.preventDefault(); e.stopPropagation(); return false; }
  }, true);

  /* 3. DevTools size-heuristic detection */
  let _dtWasOpen = false;
  function checkDevTools(){
    const THRESHOLD = 150;
    const byWidth  = window.outerWidth  - window.innerWidth  > THRESHOLD;
    const byHeight = window.outerHeight - window.innerHeight > THRESHOLD;
    const isOpen   = byWidth || byHeight;
    const overlay  = document.getElementById('dt-overlay');
    if(overlay) overlay.style.display = isOpen ? 'flex' : 'none';
    if(isOpen && !_dtWasOpen){
      _dtWasOpen = true;
      if(window._ytPlayer) try{ window._ytPlayer.pauseVideo(); }catch{}
    }
    if(!isOpen) _dtWasOpen = false;
  }
  setInterval(checkDevTools, 600);

  /* 4. Disable text selection (except exam text) */
  document.addEventListener('selectstart', e => {
    if(!e.target.closest('.txt-c,.q-txt,.opt-t')) e.preventDefault();
  });

  /* 5. Disable drag */
  document.addEventListener('dragstart', e => e.preventDefault());

  /* 6. Debugger trap — slows down DevTools scripts */
  (function dbgLoop(){
    try{ (function(){ const _s=+new Date; debugger; if(+new Date-_s>100){ if(window._ytPlayer) try{window._ytPlayer.pauseVideo();}catch{} } })(); }catch{}
    setTimeout(dbgLoop, 3000);
  })();
})();

/* ══════════════════════════════════════════════════════════
   AD BLOCKER DETECTION
   ══════════════════════════════════════════════════════════ */
function detectAdBlock(onBlocked){
  /* Method 1: bait element */
  const bait = document.createElement('div');
  bait.id = 'pub_300x250';
  bait.className = 'ad-banner advertisement pub_300x250 pub_300x250m adsbox doubleclick ad-placement textAd';
  bait.style.cssText = 'position:absolute;width:1px;height:1px;top:-10000px;left:-10000px;';
  document.body.appendChild(bait);
  setTimeout(() => {
    const cs = window.getComputedStyle(bait);
    const blocked = !bait.offsetParent || bait.offsetHeight === 0 ||
                    cs.display === 'none' || cs.visibility === 'hidden' ||
                    cs.opacity === '0';
    bait.remove();
    if(blocked) onBlocked();
  }, 300);
}

/* ══════════════════════════════════════════════════════════
   YOUTUBE IFRAME API SETUP

let _ytApiReady = false, _ytApiCallbacks = [];
window.onYouTubeIframeAPIReady = function(){
  _ytApiReady = true;
  _ytApiCallbacks.forEach(cb => cb());
  _ytApiCallbacks = [];
};

function onYtReady(cb){ _ytApiReady ? cb() : _ytApiCallbacks.push(cb); }

/* ══════════════════════════════════════════════════════════
   PLAYER STATE
   ══════════════════════════════════════════════════════════ */
window._ytPlayer = null;
let _playerInited = false;
let _progressInterval = null;
let _hideTimer = null;
let _seeking = false;
let _seekDragging = false;

/* ══════════════════════════════════════════════════════════
   PLAYER: Init / Destroy
   ══════════════════════════════════════════════════════════ */
function initPlayer(videoId, containerId){
  onYtReady(() => {
    /* If player already exists, just load new video */
    if(window._ytPlayer && _playerInited){
      try{ window._ytPlayer.loadVideoById(videoId); return; }catch{}
    }
    window._ytPlayer = new YT.Player(containerId, {
      height: '100%',
      width:  '100%',
      videoId: videoId,
      playerVars:{
        autoplay:       1,
        controls:       0,
        rel:            0,
        modestbranding: 1,
        iv_load_policy: 3,
        fs:             0,
        disablekb:      1,
        playsinline:    1,
        showinfo:       0,
        color:          'white',
        origin:         window.location.origin || 'https://kalawy.vercel.app'
      },
      events:{
        onReady:       _onPlayerReady,
        onStateChange: _onStateChange,
        onError:       _onPlayerError,
      }
    });
    _playerInited = true;
  });
}

function _onPlayerReady(e){
  e.target.playVideo();
  _startProgressLoop();
  setTimeout(_populateQualities, 2500);
  detectAdBlock(() => _showAdBlockWarn());
}

function _onStateChange(e){
  const playBtn = document.getElementById('pc-play-btn');
  if(playBtn){
    playBtn.innerHTML = e.data === YT.PlayerState.PLAYING ? '⏸' : '▶';
  }
}

function _onPlayerError(e){
  /* Error codes 101 & 150 = video blocked in embedded player (often ad blockers) */
  if([101,150,5].includes(e.data)) _showAdBlockWarn();
}

function _showAdBlockWarn(){
  const w = document.getElementById('adb-overlay');
  if(w) w.classList.remove('hidden');
}

/* ══════════════════════════════════════════════════════════
   PLAYER CONTROLS
   ══════════════════════════════════════════════════════════ */
function togglePlay(){
  if(!window._ytPlayer) return;
  try{
    const s = window._ytPlayer.getPlayerState();
    s === 1 ? window._ytPlayer.pauseVideo() : window._ytPlayer.playVideo();
    /* Flash icon */
    const flash = document.getElementById('pc-flash');
    if(flash){
      flash.textContent = s === 1 ? '⏸' : '▶';
      flash.classList.add('show');
      setTimeout(() => flash.classList.remove('show'), 500);
    }
  }catch{}
}

function setSpeed(val){
  if(!window._ytPlayer) return;
  try{ window._ytPlayer.setPlaybackRate(parseFloat(val)); }catch{}
}

function setQuality(val){
  if(!window._ytPlayer) return;
  try{ window._ytPlayer.setPlaybackQuality(val); }catch{}
}

function toggleFs(){
  const wrap = document.getElementById('player-fs-wrap');
  if(!wrap) return;
  if(!document.fullscreenElement) wrap.requestFullscreen?.();
  else document.exitFullscreen?.();
}

function _populateQualities(){
  if(!window._ytPlayer) return;
  try{
    const levels = window._ytPlayer.getAvailableQualityLevels() || [];
    const sel = document.getElementById('pc-quality-sel');
    if(!sel || !levels.length) return;
    const labels = {highres:'4K',hd2160:'4K',hd1440:'1440p',hd1080:'1080p',hd720:'720p',large:'480p',medium:'360p',small:'240p',tiny:'144p',auto:'تلقائي',default:'تلقائي'};
    sel.innerHTML = levels.map(q => `<option value="${q}">${labels[q]||q}</option>`).join('');
  }catch{}
}

/* ── Progress Loop ── */
function _startProgressLoop(){
  if(_progressInterval) clearInterval(_progressInterval);
  _progressInterval = setInterval(_updateProgress, 400);
}
function _stopProgressLoop(){
  if(_progressInterval){ clearInterval(_progressInterval); _progressInterval = null; }
}

function _updateProgress(){
  if(!window._ytPlayer || typeof window._ytPlayer.getCurrentTime !== 'function') return;
  if(_seekDragging) return;
  try{
    const cur  = window._ytPlayer.getCurrentTime() || 0;
    const dur  = window._ytPlayer.getDuration()    || 0;
    const pct  = dur > 0 ? (cur / dur * 100) : 0;
    const fill  = document.getElementById('pc-fill');
    const thumb = document.getElementById('pc-thumb');
    const time  = document.getElementById('pc-time');
    if(fill)  fill.style.width = pct + '%';
    if(thumb) thumb.style.left  = pct + '%';
    if(time)  time.textContent  = _fmt(cur) + ' / ' + _fmt(dur);
  }catch{}
}

function _fmt(sec){
  const s = Math.floor(sec), m = Math.floor(s/60), h = Math.floor(m/60);
  if(h>0) return `${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  return `${m}:${String(s%60).padStart(2,'0')}`;
}

/* ── Seek ── */
function startSeek(e){
  _seekDragging = true;
  _doSeek(e);
  const mm = e2 => _doSeek(e2);
  const mu = ()  => { _seekDragging=false; document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); };
  document.addEventListener('mousemove', mm);
  document.addEventListener('mouseup',  mu);
}
function _doSeek(e){
  if(!window._ytPlayer) return;
  const bar = document.getElementById('pc-progress');
  if(!bar) return;
  const rect = bar.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  try{
    const dur = window._ytPlayer.getDuration() || 0;
    window._ytPlayer.seekTo(pct * dur, true);
    const fill  = document.getElementById('pc-fill');
    const thumb = document.getElementById('pc-thumb');
    if(fill)  fill.style.width = (pct*100)+'%';
    if(thumb) thumb.style.left  = (pct*100)+'%';
  }catch{}
}

/* ── Controls auto-hide ── */
function _showControls(){
  const pc = document.getElementById('pc-controls');
  if(pc) pc.classList.remove('hide');
  clearTimeout(_hideTimer);
  _hideTimer = setTimeout(() => {
    if(!window._ytPlayer) return;
    try{ if(window._ytPlayer.getPlayerState() === 1){ const pc=document.getElementById('pc-controls'); if(pc)pc.classList.add('hide'); } }catch{}
  }, 3200);
}

      <div class="ei-meta">
        <div class="ei-met">📋 ${qs.length} سؤال</div>
        ${EXAM.duration_minutes?`<div class="ei-met">⏱️ ${EXAM.duration_minutes} دقيقة</div>`:''}
      </div>
    </div>
    <div class="exam-body" id="exam-body">
      ${qs.map((q,i)=>{
        const opts=Array.isArray(q.options)&&q.options.length?q.options:
          ['a','b','c','d'].filter(k=>q[`option_${k}`]).map((k)=>({text:q[`option_${k}`],is_correct:q.correct_option===k}));
        return`<div class="q-card gl" id="qc-${q.id}">
          <div class="q-num-lbl">سؤال ${i+1} من ${qs.length}</div>
          ${q.image_url?`<img class="q-img" src="${q.image_url}" alt="">`:''}
          <div class="q-txt" style="user-select:text">${q.question_text}</div>
          <div class="opts" id="opts-${q.id}">
            ${opts.map((o,oi)=>`
              <div class="opt" id="opt-${q.id}-${oi}" onclick="pickOpt('${q.id}',${oi})">
                <div class="opt-c">${String.fromCharCode(65+oi)}</div>
                <div class="opt-t">${o.text}</div>
              </div>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="exam-footer">
      <div class="exam-prog">
        <span id="ans-count">0</span> / ${qs.length} تم الإجابة
        <div class="exam-prog-bar"><div class="exam-prog-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <button class="btn btn-p btn-lg" id="submit-btn" onclick="submitExam(${JSON.stringify(qs).replace(/</g,'&lt;')})">
        📤 تسليم الامتحان
      </button>
    </div>
  </div>`;
  if(EXAM.duration_minutes) startTimer(EXAM.duration_minutes*60,qs);
}

function pickOpt(qId,idx){
  if(_submitted)return;
  document.querySelectorAll(`[id^="opt-${qId}-"]`).forEach(el=>el.classList.remove('sel'));
  document.getElementById(`opt-${qId}-${idx}`)?.classList.add('sel');
  _answers[qId]=idx;
  const total=document.querySelectorAll('.q-card').length;
  const done=Object.keys(_answers).length;
  document.getElementById('ans-count').textContent=done;
  const pf=document.getElementById('prog-fill');
  if(pf)pf.style.width=Math.round(done/total*100)+'%';
}

function startTimer(totalSec,qs){
  let sec=totalSec;
  document.getElementById('timer-bar-wrap').classList.remove('hidden');
  _timerInterval=setInterval(()=>{
    sec--;
    const fill=document.getElementById('timer-fill');
    const chip=document.getElementById('timer-chip');
    if(fill)fill.style.width=Math.round(sec/totalSec*100)+'%';
    const m=Math.floor(sec/60).toString().padStart(2,'0');
    const s=(sec%60).toString().padStart(2,'0');
    if(chip){chip.textContent=`⏱️ ${m}:${s}`;chip.classList.toggle('warn',sec<=60);}
    if(sec<=0){clearInterval(_timerInterval);submitExam(qs);}
  },1000);
}

async function submitExam(qs){
  if(_submitted)return;
  _submitted=true;
  if(_timerInterval)clearInterval(_timerInterval);
  document.getElementById('timer-bar-wrap').classList.add('hidden');
  const btn=document.getElementById('submit-btn');
  if(btn){btn.innerHTML='<span style="width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .6s linear infinite"></span> جاري التصحيح...';btn.disabled=true;}
  let correct=0;
  qs.forEach(q=>{
    const opts=Array.isArray(q.options)&&q.options.length?q.options:
      ['a','b','c','d'].filter(k=>q[`option_${k}`]).map(k=>({text:q[`option_${k}`],is_correct:q.correct_option===k}));
    const selIdx=_answers[q.id];
    if(opts[selIdx]?.is_correct)correct++;
    document.querySelectorAll(`[id^="opt-${q.id}-"]`).forEach((el,oi)=>{
      el.classList.remove('sel');
      if(opts[oi]?.is_correct)el.classList.add('correct');
      else if(oi===selIdx&&!opts[selIdx]?.is_correct)el.classList.add('wrong');
      else el.classList.add('neutral');
    });
  });
  const score=Math.round(correct/qs.length*100);
  await sb.from('exam_submissions').upsert({exam_id:EXAM.id,student_id:ME.id,score,answers:Object.entries(_answers).map(([qId,idx])=>({qId,idx}))});
  setTimeout(()=>renderResult(score,false),500);
}

function renderResult(score,alreadyDone){
  const tc=document.getElementById('tab-content');
  const pass=score>=50;
  tc.innerHTML=`
  <div class="result-card gl">
    <span class="res-ico">${pass?'🏆':'📖'}</span>
    <div class="res-score ${pass?'res-pass':'res-fail'}">${score}%</div>
    <div class="res-label">${pass?'ممتاز! اجتزت الامتحان':'حاول مرة أخرى!'}</div>
    <div class="res-detail">${alreadyDone?'سبق وأجبت على هذا الامتحان':'تم حفظ نتيجتك تلقائياً'}</div>
    <div class="res-actions">
      ${VIDEOS.length?`<button class="btn btn-p btn-lg" onclick="switchTab('video')">▶️ شاهد الفيديو الآن</button>`:''}
      <button class="btn btn-gl" onclick="renderExam()">🔄 إعادة المراجعة</button>
    </div>
  </div>`;
}

/* ── VIDEO ── */
async function renderVideoPlayer(){
  if(EXAM){
    const{data:sub}=await sb.from('exam_submissions').select('id').eq('exam_id',EXAM.id).eq('student_id',ME.id).single();
    if(!sub){
      document.getElementById('tab-content').innerHTML=`
      <div class="result-card gl" style="text-align:center">
        <span style="font-size:3rem;display:block;margin-bottom:14px">🔒</span>
        <div style="font-size:1.2rem;font-weight:900;margin-bottom:8px">الفيديو مقفول</div>
        <div style="font-size:.88rem;color:var(--t3);margin-bottom:20px">لازم تخلص الامتحان الأول عشان تشوف الفيديو</div>
        <button class="btn btn-p btn-lg" onclick="switchTab('exam')">📝 ابدأ الامتحان</button>
      </div>`;
      return;
    }
  }
  _curPart=0; buildPlayer();
}

/* ── CONTENT ── */
function renderContent(){
  const tc=document.getElementById('tab-content');
  if(!CONTENT.length){tc.innerHTML='<div class="empty-pg"><span style="font-size:2.5rem">📭</span><div>لا يوجد محتوى</div></div>';return;}
  const icons={youtube:'🎥 فيديو',pdf:'📄 ملف PDF',image:'🖼️ صورة',text:'📝 نص'};
  tc.innerHTML=`<div class="content-section gl">
    ${CONTENT.map(ct=>{
      let body='';
      if(ct.type==='youtube'){const v=ytId(ct.url||'');body=v?`<div style="position:relative;width:100%;aspect-ratio:16/9"><iframe style="width:100%;height:100%;border:none;border-radius:var(--r-sm)" src="https://www.youtube.com/embed/${v}?rel=0" allowfullscreen></iframe></div>`:`<div style="color:var(--t3);padding:10px">رابط غير صحيح</div>`;}
      else if(ct.type==='pdf')body=`<a class="pdf-link" href="${ct.url}" target="_blank">📄 ${ct.title||'فتح الملف'} ←</a>`;
      else if(ct.type==='image')body=`<img class="img-c" src="${ct.url}" alt="${ct.title||''}">`;
      else if(ct.type==='text')body=`<div class="txt-c">${(ct.body||'').replace(/\n/g,'<br>')}</div>`;
      return`<div class="content-item"><div class="ci-head">${icons[ct.type]||ct.type}${ct.title?` — ${ct.title}`:''}</div><div class="ci-body">${body}</div></div>`;
    }).join('')}
  </div>`;
}

function showError(msg){
  document.getElementById('main').innerHTML=`
  <div class="empty-pg">
    <span style="font-size:3rem">🔒</span>
    <div style="font-size:1.1rem;font-weight:800">${msg}</div>
    <button class="btn btn-p" style="margin-top:16px" onclick="goHome()">← العودة</button>
  </div>`;
}

document.getElementById('page-loading')?.remove();
init();
</script>
</body>
</html>
